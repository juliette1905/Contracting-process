<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contracting Decision Tree</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        .container { max-width: 800px; margin: auto; }
        .tree { display: flex; flex-direction: column; align-items: center; }
        .node { margin: 10px; padding: 15px; border: 1px solid #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contracting Decision Tree</h1>
        <div class="tree">
            <div class="node">
                <h2>Is the procurement domain?</h2>
                <button onclick="procurementResponse()">Yes</button>
                <button onclick="nonProcurementResponse()">No</button>
            </div>
        </div>
    </div>
    <script>
        function procurementResponse() {
            alert('You have selected Procurement domain.');
            // Add further logic for procurement domains
        }

        function nonProcurementResponse() {
            alert('You have selected Non-Procurement category.');
            // Add further logic for non-procurement categories
        }
    </script>
</body>
</html>
