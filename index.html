<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Contracting Process</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        h1 { color: #333; }\n        .form-group { margin: 10px 0; }\n        label { display: block; margin-bottom: 5px; }\n        input, select, button { padding: 10px; width: 100%; }\n        button { background-color: #28a745; color: white; border: none; cursor: pointer; }\n        button:hover { background-color: #218838; }\n    </style>\n</head>\n<body>\n    <h1>Contracting Process Application</h1>\n    <form id="contractForm">\n        <div class="form-group">\n            <label for="contractorName">Contractor Name:</label>\n            <input type="text" id="contractorName" required>\n        </div>\n        <div class="form-group">\n            <label for="projectDetails">Project Details:</label>\n            <input type="text" id="projectDetails" required>\n        </div>\n        <div class="form-group">\n            <label for="contractAmount">Contract Amount:</label>\n            <input type="number" id="contractAmount" required>\n        </div>\n        <button type="submit">Submit Contract</button>\n    </form>\n    <script>\n        document.getElementById('contractForm').addEventListener('submit', function(event) {\n            event.preventDefault(); // Prevent default form submission\n            const name = document.getElementById('contractorName').value;\n            const details = document.getElementById('projectDetails').value;\n            const amount = document.getElementById('contractAmount').value;\n            // Here you can add your processing logic\n            alert(`Contract submitted by ${name} for ${details} with amount $${amount}`);\n        });\n    </script>\n</body>\n</html>
