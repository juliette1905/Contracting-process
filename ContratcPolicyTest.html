<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Policy Test</title>
    <style>
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="empty-state">
        <h2>Welcome!</h2>
        <p>You're on a 4-step process to ensure all necessary approvals are in place. Each step corresponds to a specific transaction type.</p>
        <p>Tip: Don’t forget to check Corporate Approval before you proceed!</p>
    </div>

    <script>
        let currentStep = 1;

        function updateStepIndicator() {
            const stepIndicator = document.getElementById('step-indicator');
            if (stepIndicator) {
                stepIndicator.textContent = `Step ${currentStep} of 4`;
            }
        }

        function openCorporateApprovalModal() {
            // Logic to open the Corporate Approval Modal
            // (keeping it non-dismissible)
            // Preserving the current step
            console.log(`Opening Corporate Approval Modal from step ${currentStep}`);
        }

        document.addEventListener('DOMContentLoaded', function () {
            // Removed: auto-open the Corporate Approval Modal
            updateStepIndicator();
        });

        document.body.insertAdjacentHTML('beforeend', '<button class="button" id="check-approval">🔐 Check Corporate Approval</button>');
        document.getElementById('check-approval').addEventListener('click', openCorporateApprovalModal);
    </script>
</body>
</html>
